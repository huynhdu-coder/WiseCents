name: Build and deploy Node.js app to Azure Web App - wisecents-backend-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x' 
      - name: Install dependencies, generate Prisma, build and test
        run: |
          npm install
          npx prisma generate
          npm run build --if-present
          npm run test --if-present
        working-directory: server

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: server/   # includes node_modules + prisma client

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5E38F34B62024CF18CE49F36DF168D7C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9B0E92EA9C894D048D043326AFF9AD11 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C70CC087FDDA40219FD64A387644FF7D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: wisecents-backend-dev
          package: .



